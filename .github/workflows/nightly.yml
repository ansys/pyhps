name: Nightly Build
on:
  workflow_dispatch:
    inputs:
      hps-version:
        description: HPS version to test against
        default: 'latest-dev'
        type: choice
        options:
          - 'v1.0.2'
          - 'v1.1.1'
          - 'v1.2.0'
          - 'v1.3.45'
          - 'v1.4.10'
          - 'latest-dev'

  schedule:
  - cron: "0 2 * * *"

env:
  MAIN_PYTHON_VERSION: '3.14'
  PACKAGE_NAME: 'ansys-hps-client'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:

  style:
    permissions:
      contents: read
    uses: ./.github/workflows/style.yml

  tests:
    strategy:
      matrix:
          os: ['ubuntu-latest']
          cfg: [
              { python-version: '3.10', toxenv: 'py310' },
              { python-version: '3.11', toxenv: 'py311' },
              { python-version: '3.12', toxenv: 'py312' },
              { python-version: '3.13', toxenv: 'py313' },
              { python-version: '3.14', toxenv: 'py314' },
            ]
      fail-fast: false
    permissions:
      contents: read
    uses: ./.github/workflows/tests.yml
    secrets:
      PYANSYS_CI_BOT_PACKAGE_TOKEN: ${{ secrets.PYANSYS_CI_BOT_PACKAGE_TOKEN }}
      PYANSYS_CI_BOT_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
      PYANSYS_CI_BOT_USERNAME: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      python-version: ${{ matrix.cfg.python-version }}   
      toxenv: ${{ matrix.cfg.toxenv }}
      runner: ${{ matrix.os }}
      hps-version: ${{ inputs.hps-version || 'latest-dev' }}
      
  smoke-tests:
    name: Build and Smoke tests
    runs-on: ${{ matrix.os }}
    needs: [style]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        should-release:
          - ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags') }}
        exclude:
          - should-release: false 
            os: macos-latest
    steps:
      - uses: extractions/netrc@c3879108aae6b4ed5c4eb60854ae04f06d2f2f68 # v3
        with:
          machine: github.com
          username: pyansys-ci-bot
          password: ${{ secrets.PYANSYS_CI_BOT_PACKAGE_TOKEN }}

      - name: Build wheelhouse and perform smoke test
        uses: ansys/actions/build-wheelhouse@v10.3.3
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          operating-system: ${{ matrix.os }}
          python-version: ${{ matrix.python-version }}

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [style]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - uses: extractions/netrc@c3879108aae6b4ed5c4eb60854ae04f06d2f2f68 # v3
        with:
          machine: github.com
          username: pyansys-ci-bot
          password: ${{ secrets.PYANSYS_CI_BOT_PACKAGE_TOKEN }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools tox

          # Necessary for creating PDF
          sudo apt update
          sudo apt-get -y install latexmk
          sudo apt install texlive-latex-extra

      - name: Generate the documentation with tox
        env:
          DOC_PLATFORM: ${{ runner.os == 'Linux' && 'linux' || 'windows' }}
        run: tox -e "doc-html-${DOC_PLATFORM},doc-pdf-${DOC_PLATFORM}"

      - name: Upload HTML Documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: documentation-html
          path: doc/_build/html
          retention-days: 7

      - name: Upload PDF Documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: documentation-pdf
          path: doc/_build/latex/*.pdf
          retention-days: 7