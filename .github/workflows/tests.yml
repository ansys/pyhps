name: Tests (callable) 

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        type: string
        default: '3.10'
      toxenv:
        description: Name of the tox environment
        type: string
        default: 'py310'
      runner:
        description: Where to run
        type: string
        default: 'ubuntu-latest'
      hps-version:
        description: HPS version to test against
        type: string
        default: 'latest-dev'
      hps-feature:
        description: HPS Feature to test against (only for latest-dev version)
        type: string
        default: 'main'
      docker-compose-profiles:
        description: Docker compose profiles to use
        type: string
      upload-coverage:
        description: Whether to upload coverage results
        type: boolean
        default: true
    secrets:
      PYANSYS_CI_BOT_PACKAGE_TOKEN:
        required: true
      PYANSYS_CI_BOT_TOKEN:
        required: true
      PYANSYS_CI_BOT_USERNAME:
        required: true
      CODECOV_TOKEN:
        required: true

permissions: {}

jobs:

  tests:
    name: Tests and coverage
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python-version }}
        
      - uses: extractions/netrc@c3879108aae6b4ed5c4eb60854ae04f06d2f2f68 # v3
        with:
          machine: github.com
          username: pyansys-ci-bot
          password: ${{ secrets.PYANSYS_CI_BOT_PACKAGE_TOKEN }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools tox tox-gh-actions
          mkdir docker-compose-artifact
      
      - name: Start HPS services
        id: hps-services
        uses: ansys/pyhps/.github/actions/hps_services@main
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          ghcr-username: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          ghcr-token: ${{ secrets.PYANSYS_CI_BOT_PACKAGE_TOKEN }}
          version: ${{ inputs.hps-version }}
          feature: ${{ inputs.hps-feature }}
          profile: ${{ inputs.docker-compose-profiles }}
   
      - name: Test with tox
        run: tox -e "${TOXENV_NAME}-coverage"
        env:
          TOXENV_NAME: ${{ inputs.toxenv }}
          HPS_TEST_URL: ${{ steps.hps-services.outputs.url }}
          HPS_TEST_USERNAME: repadmin
          HPS_TEST_PASSWORD: repadmin

      - name: Upload coverage results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ inputs.python-version == '3.10' && inputs.upload-coverage }}
        with:
          name: coverage-html
          path: .cov/html
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        if: ${{ inputs.python-version == '3.10' && inputs.upload-coverage }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: '**/test*.xml'

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6
        if: always()
        with:
          report_paths: '**/test*.xml'
          check_name: Test Report ${{ inputs.runner }}:${{ inputs.python-version }}
          detailed_summary: true
          include_passed: true

      - name: Publish services info to summary
        if: success() || failure()
        run: cat build_info.md >> $GITHUB_STEP_SUMMARY
